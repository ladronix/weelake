name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Fast static checks — must pass on every commit
  # ---------------------------------------------------------------------------
  quality:
    name: Lint · Type-check · Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type-check (web)
        run: pnpm --filter web type-check

      - name: Lint (web)
        run: pnpm --filter web lint

      - name: Type-check (worker)
        run: pnpm --filter openmeteo-refresh exec tsc --noEmit

      - name: Unit tests
        run: pnpm --filter web test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: apps/web/coverage
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Full production build — ensures pages compile
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    env:
      # Build-time placeholders — real values injected by Vercel at deploy time.
      NEXT_PUBLIC_SUPABASE_URL:      "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
      SUPABASE_SERVICE_ROLE_KEY:     "placeholder-service-key"
      NEXT_PUBLIC_SITE_URL:          "https://weelake.com"
      NEXT_TELEMETRY_DISABLED:       "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter web build

  # ---------------------------------------------------------------------------
  # Python worker sanity
  # ---------------------------------------------------------------------------
  python:
    name: Python worker
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        working-directory: services/copernicus-fetcher
        run: |
          python -m pip install --upgrade pip
          pip install httpx supabase python-dotenv
      - name: Syntax check
        working-directory: services/copernicus-fetcher
        run: python -m py_compile fetch.py

  # ---------------------------------------------------------------------------
  # Security scan (no failures on dev-deps for MVP; alerts on real issues)
  # ---------------------------------------------------------------------------
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Audit (high+)
        run: pnpm audit --prod --audit-level high
