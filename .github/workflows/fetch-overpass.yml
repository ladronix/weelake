name: Fetch · Overpass lake polygons (weekly)

# OpenStreetMap Overpass API — polygon shapes for every lake.
# Runs weekly on Sunday at 04:30 UTC. Overpass has a query cost
# budget of 15 s / 2 slots per client, and even with careful
# rate limiting a 344-lake sweep takes ~30-60 min. Running
# weekly is plenty — lake shorelines don't change day-to-day.
#
# The fetcher skips lakes we already have polygons for, so a
# retry after a partial success just fills in the gaps rather
# than re-fetching everything. Pass --rebuild to force.

on:
  schedule:
    - cron: "30 4 * * 0"      # Sunday 04:30 UTC
  workflow_dispatch:
    inputs:
      rebuild:
        description: "Re-fetch polygons we already have (slow!)"
        required: false
        default: "false"

concurrency:
  group: fetch-overpass
  cancel-in-progress: false

jobs:
  fetch:
    name: Refresh lake polygons
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NEXT_PUBLIC_SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
      SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      FORCE_JSON_LOGS:            "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Fetch polygons
        run: |
          set -o pipefail
          FLAGS=""
          if [ "${{ github.event.inputs.rebuild }}" = "true" ]; then
            FLAGS="--rebuild"
          fi
          pnpm --filter @weelake/fetcher-overpass start -- $FLAGS 2>&1 | tee /tmp/fetch.log

      - name: Summary
        if: always()
        run: |
          {
            echo "## Overpass · weekly polygon refresh"
            echo ""
            echo "Finished at $(date -u +%FT%TZ)"
            echo ""
            RUN=$(grep -o '{"[^}]*"event":"run.finish"[^}]*}' /tmp/fetch.log | tail -1 || true)
            if [ -n "$RUN" ]; then
              echo '```json'
              echo "$RUN" | python3 -m json.tool
              echo '```'
              echo ""
              OK=$(echo "$RUN"    | python3 -c 'import sys,json; print(json.load(sys.stdin).get("ok", 0))')
              FAIL=$(echo "$RUN"  | python3 -c 'import sys,json; print(json.load(sys.stdin).get("fail", 0))')
              SKIP=$(echo "$RUN"  | python3 -c 'import sys,json; print(json.load(sys.stdin).get("skip", 0))')
              DURMS=$(echo "$RUN" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("duration_ms", 0))')
              STATUS=$(echo "$RUN"| python3 -c 'import sys,json; print(json.load(sys.stdin).get("status", "?"))')
              echo "**Result:** \`status=$STATUS\` · ok=$OK · fail=$FAIL · skip=$SKIP · duration=${DURMS}ms"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
