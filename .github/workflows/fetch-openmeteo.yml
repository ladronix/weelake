name: Fetch ┬Ę Open-Meteo (daily)

# Open-Meteo Forecast + Marine ŌĆö the LIVE data source that powers
# the map's `lakes_current` view. See docs/DATA-SOURCES.md.
#
# Cadence: daily at 03:00 UTC (before European morning traffic).
# On failure: GitHub emails the repo admins by default (unless
# they've turned off workflow-failure notifications in their user
# settings), so we don't wire a bespoke alert channel.

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

concurrency:
  group: fetch-openmeteo
  cancel-in-progress: false

jobs:
  fetch:
    name: Refresh Open-Meteo temperatures
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
      SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      FORCE_JSON_LOGS:            "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Verify secrets present
        run: |
          test -n "$SUPABASE_URL"              || (echo "::error::SUPABASE_URL secret missing" && exit 1)
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || (echo "::error::SUPABASE_SERVICE_ROLE_KEY secret missing" && exit 1)

      - run: pnpm install --no-frozen-lockfile

      - name: Refresh temperatures
        id: fetch
        run: |
          set -o pipefail
          # Tee to a file so the summary step can post-process the
          # structured JSON log lines without a second run.
          pnpm --filter @weelake/fetcher-openmeteo start 2>&1 | tee /tmp/fetch.log

      - name: Summary
        if: always()
        run: |
          {
            echo "## Open-Meteo ┬Ę daily refresh"
            echo ""
            echo "Finished at $(date -u +%FT%TZ)"
            echo ""
            # Extract the last run.finish JSON row and pretty-print it.
            RUN=$(grep -o '{"[^}]*"event":"run.finish"[^}]*}' /tmp/fetch.log | tail -1 || true)
            if [ -n "$RUN" ]; then
              echo '```json'
              echo "$RUN" | python3 -m json.tool
              echo '```'
              echo ""
              # Pull the counts and duration for a headline.
              OK=$(echo "$RUN"    | python3 -c 'import sys,json; print(json.load(sys.stdin).get("ok", 0))')
              FAIL=$(echo "$RUN"  | python3 -c 'import sys,json; print(json.load(sys.stdin).get("fail", 0))')
              SKIP=$(echo "$RUN"  | python3 -c 'import sys,json; print(json.load(sys.stdin).get("skip", 0))')
              DURMS=$(echo "$RUN" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("duration_ms", 0))')
              STATUS=$(echo "$RUN"| python3 -c 'import sys,json; print(json.load(sys.stdin).get("status", "?"))')
              echo "**Result:** \`status=$STATUS\` ┬Ę ok=$OK ┬Ę fail=$FAIL ┬Ę skip=$SKIP ┬Ę duration=${DURMS}ms"
              echo ""
              # Show the last 10 lake.fail lines so a partial run is diagnosable.
              FAILS=$(grep '"event":"lake.fail"' /tmp/fetch.log | tail -10 || true)
              if [ -n "$FAILS" ]; then
                echo "### Recent failures (last 10)"
                echo '```'
                echo "$FAILS"
                echo '```'
              fi
            else
              echo "_(no run.finish line found ŌĆö the fetcher may have crashed before recording a run)_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
