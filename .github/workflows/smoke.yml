name: Smoke test (production)

# Only runs on manual dispatch (not auto after CI) — because the domain
# is not yet configured until Vercel is wired up. Once weelake.com is live,
# switch on the workflow_run trigger below.
on:
  workflow_dispatch:
    inputs:
      site_url:
        description: "Deployed site URL to probe"
        required: false
        default: "https://weelake.com"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Set target URL
        id: target
        run: |
          URL="${{ github.event.inputs.site_url }}"
          [ -z "$URL" ] && URL="https://weelake.com"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Probing $URL"

      - name: Landing page returns 200
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.target.outputs.url }}/")
          echo "GET / → $code"
          test "$code" = "200"

      - name: /map returns 200
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.target.outputs.url }}/map")
          echo "GET /map → $code"
          test "$code" = "200"

      - name: /api/stats returns JSON
        run: |
          body=$(curl -s "${{ steps.target.outputs.url }}/api/stats")
          echo "$body" | head -c 500
          echo "$body" | jq -e '.total_lakes' > /dev/null

      - name: /api/search returns results for 'lipno'
        run: |
          body=$(curl -s "${{ steps.target.outputs.url }}/api/search?q=lipno")
          echo "$body" | jq -e '.results | length > 0' > /dev/null

      - name: robots.txt served
        run: |
          curl -sf "${{ steps.target.outputs.url }}/robots.txt" | grep -q "Sitemap"

      - name: sitemap.xml served
        run: |
          curl -sf "${{ steps.target.outputs.url }}/sitemap.xml" | head -c 500
