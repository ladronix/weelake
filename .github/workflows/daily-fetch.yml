name: Daily temperature refresh

on:
  schedule:
    # 03:00 UTC daily — before typical CET morning traffic.
    - cron: "0 3 * * *"
  workflow_dispatch: {}

concurrency:
  group: daily-fetch
  cancel-in-progress: false

jobs:
  openmeteo-refresh:
    name: Refresh Open-Meteo temperatures
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
      SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Verify secrets present
        run: |
          test -n "$SUPABASE_URL"              || (echo "::error::SUPABASE_URL secret missing" && exit 1)
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || (echo "::error::SUPABASE_SERVICE_ROLE_KEY secret missing" && exit 1)

      - run: pnpm install --no-frozen-lockfile

      - name: Refresh temperatures
        run: pnpm --filter @weelake/fetcher-openmeteo start

      - name: Summary
        if: always()
        run: echo "Refresh finished at $(date -u +%FT%TZ)" >> "$GITHUB_STEP_SUMMARY"
